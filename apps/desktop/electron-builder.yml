appId: com.muswag.desktop
productName: Muswag
directories:
  buildResources: build
files:
  - out/**
  - package.json
asarUnpack:
  - node_modules/better-sqlite3/**
win:
  executableName: Muswag
  target:
    - nsis
mac:
  category: public.app-category.music
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - dmg
    - zip
linux:
  category: AudioVideo
  maintainer: illkle <kelolov@gmail.com>
  artifactName: muswag-${version}-${arch}.${ext}
  target:
    - AppImage
    - deb
npmRebuild: false
publish:
  provider: github
  owner: illkle
  repo: muswag
  releaseType: release
